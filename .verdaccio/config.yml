storage: ../tmp/local-registry/storage

uplinks:
  npmjs:
    url: https://registry.npmjs.org/
    maxage: 60m
    timeout: 120s
    max_fails: 1000
    fail_timeout: 1s
    agent_options:
      keepAlive: true
      maxSockets: 40
      maxFreeSockets: 10

server:
  keepAliveTimeout: 60

# Package managers are configured (see e2e/src/global-setup.ts) to route only
# @aws/* to this registry; everything else goes to npmjs. The three local
# packages MUST NOT proxy to npmjs, because our workspace version (0.0.0)
# collides with an early public release also tagged 0.0.0 — if verdaccio
# merges upstream metadata, the republish fails with 409 Conflict.
packages:
  '@aws/nx-plugin':
    access: $all
    publish: $all
    unpublish: $all
  '@aws/nx-plugin-mcp':
    access: $all
    publish: $all
    unpublish: $all
  '@aws/create-nx-workspace':
    access: $all
    publish: $all
    unpublish: $all
  '@aws/*':
    access: $all
    publish: $all
    unpublish: $all
    proxy: npmjs
  '**':
    access: $all
    publish: $all
    unpublish: $all
    proxy: npmjs

log:
  type: stdout
  format: pretty
  level: warn
