storage: ../tmp/local-registry/storage

uplinks:
  npmjs:
    url: https://registry.npmjs.org/
    maxage: 60m
    timeout: 120s
    max_fails: 1000
    fail_timeout: 1s
    agent_options:
      keepAlive: true
      maxSockets: 40
      maxFreeSockets: 10

server:
  keepAliveTimeout: 60

# Package managers are configured (see e2e/src/global-setup.ts) to route only
# @aws/* to this registry; everything else goes to npmjs. Verdaccio serves our
# locally-published packages from storage and proxies any other @aws/* through
# npmjs.
packages:
  '@aws/*':
    access: $all
    publish: $all
    unpublish: $all
    proxy: npmjs
  '**':
    access: $all
    publish: $all
    unpublish: $all
    proxy: npmjs

log:
  type: stdout
  format: pretty
  level: warn
