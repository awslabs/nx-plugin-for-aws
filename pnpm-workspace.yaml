packages:
  - 'packages/*'
# pnpm 11 key — silently ignored by pnpm 10
allowBuilds:
  '@swc/core': true
  core-js: true
  esbuild: true
  node-pty: true
  nx: true
  sharp: true
# nx 23 packages were published recently; exclude them from the
# minimumReleaseAge gate so installs don't reject the freshly released versions.
minimumReleaseAgeExclude:
  - '@nx/devkit@23.0.0'
  - '@nx/eslint@23.0.0'
  - '@nx/js@23.0.0'
  - '@nx/module-federation@23.0.0'
  - '@nx/nx-darwin-arm64@23.0.0'
  - '@nx/nx-darwin-x64@23.0.0'
  - '@nx/nx-freebsd-x64@23.0.0'
  - '@nx/nx-linux-arm-gnueabihf@23.0.0'
  - '@nx/nx-linux-arm64-gnu@23.0.0'
  - '@nx/nx-linux-arm64-musl@23.0.0'
  - '@nx/nx-linux-x64-gnu@23.0.0'
  - '@nx/nx-linux-x64-musl@23.0.0'
  - '@nx/nx-win32-arm64-msvc@23.0.0'
  - '@nx/nx-win32-x64-msvc@23.0.0'
  - '@nx/playwright@23.0.0'
  - '@nx/react@23.0.0'
  - '@nx/rollup@23.0.0'
  - '@nx/vite@23.0.0'
  - '@nx/vitest@23.0.0'
  - '@nx/web@23.0.0'
  - '@nx/workspace@23.0.0'
  - nx@23.0.0
# pnpm 10 key — silently ignored by pnpm 11
onlyBuiltDependencies:
  - '@swc/core'
  - core-js
  - esbuild
  - node-pty
  - nx
  - sharp
