name: CI

concurrency:
  group: ci-${{ github.ref }}

on:
  push:
    branches: [main, 'release/0.x']
  workflow_dispatch:

env:
  CI: 'true'
  NX_DAEMON: 'true'

permissions:
  pull-requests: write
  issues: write
  statuses: write
  checks: write
  contents: write
  actions: read
  pages: write
  id-token: write

jobs:
  package:
    name: Package
    runs-on: codebuild-nx-plugin-for-aws-runner-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/init-monorepo
        with:
          aws-docker-login-role-arn: ${{ secrets.AWS_DOCKER_LOGIN_ROLE_ARN }}
      - name: Package plugins
        run: pnpm package:all --output-style=stream
      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: build-artifact
          path: dist
  build:
    name: Build
    runs-on: codebuild-nx-plugin-for-aws-runner-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/init-monorepo
        with:
          aws-docker-login-role-arn: ${{ secrets.AWS_DOCKER_LOGIN_ROLE_ARN }}
          container-tools: 'false'
      - name: Build
        env:
          DOCS_BASE_PATH: ${{ github.ref == 'refs/heads/main' && '/nx-plugin-for-aws/preview' || '/nx-plugin-for-aws' }}
        run: pnpm nx run-many --target build --all --output-style=stream
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Check for mutations
        run: git diff --ignore-space-at-eol --exit-code -- ':!**/LICENSE-THIRD-PARTY'
      - name: Upload docs artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: docs-artifact
          path: docs/dist
  smoke_tests:
    name: Smoke Tests - ${{matrix.smoke_test}}
    runs-on: codebuild-nx-plugin-for-aws-runner-${{ github.run_id }}-${{ github.run_attempt }}
    needs: package
    strategy:
      fail-fast: false
      matrix:
        smoke_test:
          - npm
          - yarn-classic
          - yarn-4
          - pnpm-10
          - pnpm-11
          - bun
          - no-interactive
          - dungeon-adventure
          - terraform
          - rdb
          - trpc-api
          - fast-api
          - smithy-api
          - react-website
          - infra-none
          - idempotency
          - cdk-deploy
          - cdk-deploy-rdb
          - terraform-deploy
          - terraform-deploy-rdb
          - license-sync
          - mcp-server
          - local-dev
          - git-secrets
          - finch
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifact
          path: dist
      - uses: ./.github/actions/init-monorepo
        with:
          aws-docker-login-role-arn: ${{ secrets.AWS_DOCKER_LOGIN_ROLE_ARN }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.DEPLOY_INTEG_TESTS_ROLE_ARN }}
          aws-region: us-west-2
          role-duration-seconds: 10800
      - name: Smoke Test - ${{ matrix.smoke_test }}
        run: pnpm nx run @aws/nx-plugin-e2e:smoke-test --name=${{ matrix.smoke_test }}
  smoke_tests_windows:
    name: Windows Smoke Tests - ${{matrix.smoke_test}}
    runs-on: windows-latest
    needs: package
    strategy:
      fail-fast: false
      matrix:
        smoke_test:
          - pnpm-10
          - pnpm-11
          - dungeon-adventure
          - git-secrets
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Disable Windows Defender real-time monitoring
        run: Set-MpPreference -DisableRealtimeMonitoring $true
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifact
          path: dist
      - uses: ./.github/actions/init-monorepo
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.DEPLOY_INTEG_TESTS_ROLE_ARN }}
          aws-region: us-west-2
          role-duration-seconds: 10800
      - name: Windows Smoke Test - ${{ matrix.smoke_test }}
        run: pnpm nx run @aws/nx-plugin-e2e:smoke-test --name=${{ matrix.smoke_test }}
  release:
    name: Release
    needs: [package, build, smoke_tests, smoke_tests_windows]
    runs-on: ubuntu-22.04
    outputs:
      latest_commit: ${{ steps.git_remote.outputs.latest_commit }}
      skip_release: ${{ steps.should_skip_release.outputs.skip_release }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifact
          path: dist
      - uses: ./.github/actions/init-monorepo
        with:
          aws-docker-login-role-arn: ${{ secrets.AWS_DOCKER_LOGIN_ROLE_ARN }}
      - name: Check for new commits
        id: git_remote
        run: echo "latest_commit=$(git ls-remote origin -h ${{ github.ref }} | cut -f1)" >> $GITHUB_OUTPUT
      - name: Should skip release
        id: should_skip_release
        run: echo "skip_release=$(git log $(git describe --tags --abbrev=0)..HEAD --oneline | grep -qE 'feat\(?.*\)?:|fix\(?.*\)?:|revert\(?.*\)?:|perf\(?.*\)?:' && echo false || echo true)" >> $GITHUB_OUTPUT
      - name: Release
        if: ${{ steps.should_skip_release.outputs.skip_release != 'true' && github.event_name == 'push' && steps.git_remote.outputs.latest_commit == github.sha }}
        env:
          # NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_DIST_TAG: ${{ github.ref == 'refs/heads/release/0.x' && 'latest' || 'next' }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          HUSKY: '0'
        run: |
          if [ "${{ github.ref }}" = "refs/heads/release/0.x" ]; then
            pnpm nx release --skip-publish
          else
            CURRENT_VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
            if echo "$CURRENT_VERSION" | grep -q "rc"; then
              pnpm nx release --skip-publish --preid rc
            else
              pnpm nx release --skip-publish --specifier premajor --preid rc
            fi
          fi
          pnpm nx release publish --tag "$NPM_DIST_TAG"
  deploy_docs:
    name: Deploy Docs
    runs-on: ubuntu-latest
    if: ${{ (github.ref == 'refs/heads/release/0.x' || github.ref == 'refs/heads/main') && github.event_name == 'push' && needs.release.outputs.latest_commit == github.sha }}
    needs: [release]
    steps:
      - name: Download docs artifact (this branch)
        uses: actions/download-artifact@v8
        with:
          name: docs-artifact
          path: docs-this-branch
      - name: Download docs artifact (other branch)
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: ci.yml
          branch: ${{ github.ref == 'refs/heads/main' && 'release/0.x' || 'main' }}
          name: docs-artifact
          path: docs-other-branch
          if_no_artifact_found: warn
        continue-on-error: true
      - name: Merge docs artifacts
        run: |
          mkdir -p docs-site
          if [ "${{ github.ref }}" = "refs/heads/release/0.x" ]; then
            cp -r docs-this-branch/* docs-site/
            if [ -d docs-other-branch ] && [ "$(ls -A docs-other-branch 2>/dev/null)" ]; then
              mkdir -p docs-site/preview
              cp -r docs-other-branch/* docs-site/preview/
            fi
          else
            if [ -d docs-other-branch ] && [ "$(ls -A docs-other-branch 2>/dev/null)" ]; then
              cp -r docs-other-branch/* docs-site/
            fi
            mkdir -p docs-site/preview
            cp -r docs-this-branch/* docs-site/preview/
          fi
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'docs-site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
