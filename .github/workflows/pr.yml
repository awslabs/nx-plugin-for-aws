name: PR

on:
  pull_request:
    branches: [main, 'release/0.x']

env:
  CI: 'true'
  NX_DAEMON: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  issues: write
  statuses: write
  checks: write
  contents: write
  actions: read
  pages: write
  id-token: write

jobs:
  package:
    name: Package
    runs-on: codebuild-nx-plugin-for-aws-runner-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/init-monorepo
        with:
          aws-docker-login-role-arn: ${{ secrets.AWS_DOCKER_LOGIN_ROLE_ARN }}
      - name: Package plugins
        run: pnpm package:all --output-style=stream
      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: build-artifact
          path: dist
  build:
    name: Build
    runs-on: codebuild-nx-plugin-for-aws-runner-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/init-monorepo
        with:
          aws-docker-login-role-arn: ${{ secrets.AWS_DOCKER_LOGIN_ROLE_ARN }}
          container-tools: 'false'
      - name: Build
        run: pnpm nx run-many --target build --all --output-style=stream
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Check for mutations
        run: git diff --ignore-space-at-eol --exit-code -- ':!**/LICENSE-THIRD-PARTY'
  smoke_tests:
    name: Smoke Tests - ${{matrix.smoke_test}}
    runs-on: codebuild-nx-plugin-for-aws-runner-${{ github.run_id }}-${{ github.run_attempt }}
    needs: package
    strategy:
      fail-fast: false
      matrix:
        smoke_test:
          - npm
          - yarn-classic
          - yarn-4
          - pnpm-10
          - pnpm-11
          - bun
          - no-interactive
          - dungeon-adventure
          - terraform
          - rdb
          - trpc-api
          - fast-api
          - smithy-api
          - react-website
          - infra-none
          - idempotency
          - license-sync
          - license-check
          - mcp-server
          - serve-local
          - git-secrets
          - finch
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifact
          path: dist
      - uses: ./.github/actions/init-monorepo
        with:
          aws-docker-login-role-arn: ${{ secrets.AWS_DOCKER_LOGIN_ROLE_ARN }}
          # serve-local (and other) smoke tests spawn many uv dev servers that
          # are killed mid-run; the post-job `uv cache prune` can then hang and
          # fail the job even when all tests passed. The cache buys little here.
          enable-uv-cache: 'false'
      - name: Smoke Test - ${{ matrix.smoke_test }}
        run: pnpm nx run @aws/nx-plugin-e2e:smoke-test --name=${{ matrix.smoke_test }}
  smoke_tests_windows:
    name: Windows Smoke Tests - ${{matrix.smoke_test}}
    runs-on: windows-latest
    needs: package
    strategy:
      fail-fast: false
      matrix:
        smoke_test:
          - pnpm-11
          - dungeon-adventure
          - git-secrets
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Disable Windows Defender real-time monitoring
        run: Set-MpPreference -DisableRealtimeMonitoring $true
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifact
          path: dist
      - uses: ./.github/actions/init-monorepo
      - name: Windows Smoke Test - ${{ matrix.smoke_test }}
        run: pnpm nx run @aws/nx-plugin-e2e:smoke-test --name=${{ matrix.smoke_test }}
