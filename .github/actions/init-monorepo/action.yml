name: Initialize Monorepo
description: Initialize nx monorepo for CI workflows

inputs:
  aws-docker-login-role-arn:
    description: 'ARN of the AWS role to assume for Docker login'
    required: false
  container-tools:
    description: 'Set up QEMU and Docker Buildx for multi-arch container builds. Disable for jobs that do not build containers.'
    required: false
    default: 'true'
  enable-uv-cache:
    description: 'Enable the uv download cache. Disable for jobs (e.g. local-dev smoke tests) that spawn many uv dev servers killed mid-run, which can leave the cache in a state where the post-job `uv cache prune` hangs.'
    required: false
    default: 'true'
  setup-bun:
    description: 'Install Bun. Disable for jobs that do not run Bun (e.g. build, docs, unit tests).'
    required: false
    default: 'true'
  setup-uv:
    description: 'Install uv/Python. Disable for jobs that do not run Python tooling.'
    required: false
    default: 'true'
  setup-terraform:
    description: 'Install Terraform. Disable for jobs that do not run Terraform.'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Raise inotify limits
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      # `local-dev` smoke tests run several watch-mode dev servers in
      # parallel (Vite, tsx --watch, uvicorn/watchfiles), which can exhaust the
      # runner's default inotify limits. Raise them to dev-machine levels. Try
      # as the current user (CodeBuild runs as root) then fall back to sudo.
      run: |
        raise() {
          sysctl -w "$1" 2>/dev/null || sudo sysctl -w "$1" 2>/dev/null || true
        }
        raise fs.inotify.max_user_instances=1024
        raise fs.inotify.max_user_watches=1048576
        echo "max_user_instances=$(cat /proc/sys/fs/inotify/max_user_instances)"
        echo "max_user_watches=$(cat /proc/sys/fs/inotify/max_user_watches)"
    - name: Docker login credentials
      if: ${{ inputs.aws-docker-login-role-arn != '' }}
      uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5
      with:
        role-to-assume: ${{ inputs.aws-docker-login-role-arn }}
        aws-region: us-east-1
    - name: Login to ECR
      if: ${{ inputs.aws-docker-login-role-arn != '' }}
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: public.ecr.aws
    - name: Use PNPM
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      if: ${{ runner.os != 'Windows' && inputs.setup-bun == 'true' }}
      with:
        bun-version: 1.3.6
    - name: Use Node.js 22.x
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: 22
        registry-url: 'https://registry.npmjs.org'
    - name: Install the latest version of uv
      if: ${{ inputs.setup-uv == 'true' }}
      uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      with:
        version: 'latest'
        enable-cache: ${{ inputs.enable-uv-cache }}
    - name: Set up QEMU
      if: ${{ runner.os != 'Windows' && inputs.container-tools == 'true' }}
      uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      with:
        image: public.ecr.aws/eks-distro-build-tooling/binfmt-misc:qemu-v7.0.0
    - name: Set up Docker Buildx
      if: ${{ runner.os != 'Windows' && inputs.container-tools == 'true' }}
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
    - name: Cache WSL2 Docker distro (Windows)
      if: ${{ runner.os == 'Windows' && inputs.container-tools == 'true' }}
      id: wsl-cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ${{ runner.temp }}\wsl-distro\ubuntu-docker.tar
        key: ${{ runner.os }}-wsl-docker-${{ hashFiles('.github/scripts/install-wsl-docker.sh') }}
    - name: Set up WSL2 Docker for Linux builds (Windows)
      if: ${{ runner.os == 'Windows' && inputs.container-tools == 'true' }}
      shell: pwsh
      run: |
        # Windows runners only have Docker in Windows-container mode, so build
        # Linux images in WSL2. The configured distro is cached as an exported
        # tarball; a cache hit imports it instead of re-running the apt install.
        $tarDir = "$env:RUNNER_TEMP\wsl-distro"
        $tar = "$tarDir\ubuntu-docker.tar"
        $installDir = "$env:RUNNER_TEMP\wsl-ubuntu"

        # Helper: convert a repo script to LF and run it in WSL2 as root.
        function Invoke-WslScript($relPath) {
          $script = Get-Content "${{ github.workspace }}/$relPath" -Raw
          $lfScript = $script -replace "`r`n", "`n"
          $tmpScript = "$env:RUNNER_TEMP/$(Split-Path $relPath -Leaf)"
          [System.IO.File]::WriteAllText($tmpScript, $lfScript)
          $wslPath = wsl -d Ubuntu-24.04 wslpath ($tmpScript -replace '\\','/')
          wsl -d Ubuntu-24.04 -u root -- bash $wslPath
          if ($LASTEXITCODE -ne 0) { throw "WSL script $relPath failed with exit code $LASTEXITCODE" }
        }

        if ("${{ steps.wsl-cache.outputs.cache-hit }}" -eq "true") {
          New-Item -ItemType Directory -Path $installDir -Force | Out-Null
          wsl --import Ubuntu-24.04 $installDir $tar
        } else {
          wsl --install Ubuntu-24.04 --no-launch
          Invoke-WslScript ".github/scripts/install-wsl-docker.sh"
          New-Item -ItemType Directory -Path $tarDir -Force | Out-Null
          # Terminate the distro so the exported tarball is a clean snapshot.
          wsl --terminate Ubuntu-24.04
          wsl --export Ubuntu-24.04 $tar
        }
        wsl --set-default Ubuntu-24.04

        # Start the daemon and select the buildx builder (runs every job).
        Invoke-WslScript ".github/scripts/start-wsl-docker.sh"

        # Install docker.cmd wrapper that forwards to WSL2 Linux daemon
        # See .github/scripts/docker-wsl.cmd for the wrapper logic.
        $wrapperDir = "C:\docker-wsl"
        New-Item -ItemType Directory -Path $wrapperDir -Force | Out-Null
        Copy-Item "${{ github.workspace }}/.github/scripts/docker-wsl.cmd" "$wrapperDir\docker.cmd"
        echo "$wrapperDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        $env:PATH = "$wrapperDir;$env:PATH"

        docker version
        docker buildx ls
    - name: Set up terraform (non-Windows)
      if: ${{ runner.os != 'Windows' && inputs.setup-terraform == 'true' }}
      uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
      with:
        terraform_version: '1.15.7'
        terraform_wrapper: false
    - name: Set up terraform (Windows)
      if: ${{ runner.os == 'Windows' && inputs.setup-terraform == 'true' }}
      shell: pwsh
      run: |
        # Install terraform manually on Windows so it lands on a PATH that
        # Nx's run-commands executor (cmd.exe subprocess) can always see.
        # hashicorp/setup-terraform uses GITHUB_PATH which doesn't propagate
        # reliably to Nx executor subprocesses on Windows.
        $version = "1.15.7"
        $tfDir = "C:\terraform"
        New-Item -ItemType Directory -Path $tfDir -Force | Out-Null
        $url = "https://releases.hashicorp.com/terraform/${version}/terraform_${version}_windows_amd64.zip"
        $zip = "$env:RUNNER_TEMP\terraform.zip"
        Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
        Expand-Archive -Path $zip -DestinationPath $tfDir -Force
        echo "$tfDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        $env:PATH = "$tfDir;$env:PATH"
        terraform version
    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
    - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      name: Setup pnpm cache
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-
    - name: Update NPM
      if: ${{ runner.os != 'Windows' }}
      shell: bash
      run: npm i -g npm@11.6.1
    - name: Install Node.js Dependencies
      shell: bash
      run: pnpm i --frozen-lockfile --prefer-offline
    - name: Set git identity
      shell: bash
      run: |-
        git config user.name "release"
        git config user.email "release@github.com"
    - uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4
