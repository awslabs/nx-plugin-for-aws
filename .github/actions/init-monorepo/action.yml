name: Initialize Monorepo
description: Initialize nx monorepo for CI workflows

inputs:
  aws-docker-login-role-arn:
    description: 'ARN of the AWS role to assume for Docker login'
    required: false
  container-tools:
    description: 'Set up QEMU and Docker Buildx for multi-arch container builds. Disable for jobs that do not build containers.'
    required: false
    default: 'true'
  enable-uv-cache:
    description: 'Enable the uv download cache. Disable for jobs (e.g. local-dev smoke tests) that spawn many uv dev servers killed mid-run, which can leave the cache in a state where the post-job `uv cache prune` hangs.'
    required: false
    default: 'true'
  setup-bun:
    description: 'Install Bun. Disable for jobs that do not run Bun (e.g. build, docs, unit tests).'
    required: false
    default: 'true'
  setup-uv:
    description: 'Install uv/Python. Disable for jobs that do not run Python tooling.'
    required: false
    default: 'true'
  setup-terraform:
    description: 'Install Terraform. Disable for jobs that do not run Terraform.'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Raise inotify limits
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      # `local-dev` smoke tests run several watch-mode dev servers in
      # parallel (Vite, tsx --watch, uvicorn/watchfiles), which can exhaust the
      # runner's default inotify limits. Raise them to dev-machine levels. Try
      # as the current user (CodeBuild runs as root) then fall back to sudo.
      run: |
        raise() {
          sysctl -w "$1" 2>/dev/null || sudo sysctl -w "$1" 2>/dev/null || true
        }
        raise fs.inotify.max_user_instances=1024
        raise fs.inotify.max_user_watches=1048576
        echo "max_user_instances=$(cat /proc/sys/fs/inotify/max_user_instances)"
        echo "max_user_watches=$(cat /proc/sys/fs/inotify/max_user_watches)"
    - name: Docker login credentials
      if: ${{ inputs.aws-docker-login-role-arn != '' }}
      uses: aws-actions/configure-aws-credentials@v5
      with:
        role-to-assume: ${{ inputs.aws-docker-login-role-arn }}
        aws-region: us-east-1
    - name: Login to ECR
      if: ${{ inputs.aws-docker-login-role-arn != '' }}
      uses: docker/login-action@v3
      with:
        registry: public.ecr.aws
    - name: Use PNPM
      uses: pnpm/action-setup@v6
    - uses: oven-sh/setup-bun@v2
      if: ${{ runner.os != 'Windows' && inputs.setup-bun == 'true' }}
      with:
        bun-version: 1.3.6
    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22
        registry-url: 'https://registry.npmjs.org'
    - name: Install the latest version of uv
      if: ${{ inputs.setup-uv == 'true' }}
      uses: astral-sh/setup-uv@v5
      with:
        version: 'latest'
        enable-cache: ${{ inputs.enable-uv-cache }}
    - name: Set up QEMU
      if: ${{ runner.os != 'Windows' && inputs.container-tools == 'true' }}
      uses: docker/setup-qemu-action@v3
      with:
        image: public.ecr.aws/eks-distro-build-tooling/binfmt-misc:qemu-v7.0.0
    - name: Set up Docker Buildx
      if: ${{ runner.os != 'Windows' && inputs.container-tools == 'true' }}
      uses: docker/setup-buildx-action@v3
    - name: Set up WSL2 Docker for Linux builds (Windows)
      if: ${{ runner.os == 'Windows' && inputs.container-tools == 'true' }}
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        # The generated Smithy/agent/mcp builds run `docker build` of a Linux
        # image. Windows has no native Linux Docker daemon, so run Docker Engine
        # inside WSL2 Ubuntu and forward `docker` to it via a shim.
        #
        # WSL2 requires the WSL + VirtualMachinePlatform optional features, and
        # enabling those needs a reboot — impossible mid-build. So the Windows
        # EC2 fleet AMI must ship with WSL2 enabled and an Ubuntu distro
        # registered; this step then just installs/starts Docker inside it. If
        # WSL isn't ready we fail with guidance rather than attempting a
        # reboot-requiring install.
        Write-Host '=== Checking WSL2 availability ==='
        $wslOk = $false
        try {
          $distros = (wsl --list --quiet) -join "`n"
          if ($LASTEXITCODE -eq 0 -and $distros -match '\S') {
            Write-Host "Registered WSL distros:`n$distros"
            $wslOk = $true
          }
        } catch { }
        if (-not $wslOk) {
          $wsl = (Get-WindowsOptionalFeature -Online -FeatureName Microsoft-Windows-Subsystem-Linux).State
          $vmp = (Get-WindowsOptionalFeature -Online -FeatureName VirtualMachinePlatform).State
          throw @"
        WSL2 is not available on this runner (WSL feature: $wsl, VirtualMachinePlatform: $vmp, no distro registered).
        Enabling these features requires a reboot, which isn't possible mid-build, so the
        Windows EC2 fleet AMI must be pre-provisioned with WSL2 enabled and an Ubuntu distro
        registered. Bake that into the fleet's custom AMI, then this step will start Docker in it.
        "@
        }

        # Pick the registered distro (prefer Ubuntu) and expose it to the docker
        # shim and later steps.
        $distro = ((wsl --list --quiet) -split "`n" | Where-Object { $_ -match '\S' } | ForEach-Object { $_.Trim() } | Sort-Object { $_ -notmatch 'Ubuntu' })[0]
        Write-Host "Using WSL distro: $distro"
        "WSL_DOCKER_DISTRO=$distro" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

        Write-Host '=== Installing/starting Docker Engine + Buildx inside WSL2 ==='
        # Convert setup script to LF line endings and run it in WSL2. The script
        # is idempotent: on a pre-provisioned AMI the apt installs are no-ops and
        # it just (re)starts the daemon.
        $script = Get-Content "${{ github.workspace }}/.github/scripts/setup-wsl-docker.sh" -Raw
        $lfScript = $script -replace "`r`n", "`n"
        $tmpScript = "$env:RUNNER_TEMP/setup-wsl-docker.sh"
        [System.IO.File]::WriteAllText($tmpScript, $lfScript)
        $wslPath = wsl -d $distro wslpath ($tmpScript -replace '\\','/')
        wsl -d $distro -u root -- bash $wslPath
        if ($LASTEXITCODE -ne 0) { throw "Docker Engine setup in WSL2 failed (exit $LASTEXITCODE)" }

        # Install docker.cmd wrapper that forwards to the WSL2 Linux daemon.
        # See .github/scripts/docker-wsl.cmd for the wrapper logic.
        $wrapperDir = "C:\docker-wsl"
        New-Item -ItemType Directory -Path $wrapperDir -Force | Out-Null
        Copy-Item "${{ github.workspace }}/.github/scripts/docker-wsl.cmd" "$wrapperDir\docker.cmd"
        echo "$wrapperDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        $env:PATH = "$wrapperDir;$env:PATH"

        Write-Host '=== Verifying docker shim ==='
        docker version
        docker buildx ls
    - name: Set up terraform (non-Windows)
      if: ${{ runner.os != 'Windows' && inputs.setup-terraform == 'true' }}
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: '1.15.7'
        terraform_wrapper: false
    - name: Set up terraform (Windows)
      if: ${{ runner.os == 'Windows' && inputs.setup-terraform == 'true' }}
      shell: pwsh
      run: |
        # Install terraform manually on Windows so it lands on a PATH that
        # Nx's run-commands executor (cmd.exe subprocess) can always see.
        # hashicorp/setup-terraform uses GITHUB_PATH which doesn't propagate
        # reliably to Nx executor subprocesses on Windows.
        $version = "1.15.7"
        $tfDir = "C:\terraform"
        New-Item -ItemType Directory -Path $tfDir -Force | Out-Null
        $url = "https://releases.hashicorp.com/terraform/${version}/terraform_${version}_windows_amd64.zip"
        $zip = "$env:RUNNER_TEMP\terraform.zip"
        Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
        Expand-Archive -Path $zip -DestinationPath $tfDir -Force
        echo "$tfDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        $env:PATH = "$tfDir;$env:PATH"
        terraform version
    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
    - uses: actions/cache@v4
      name: Setup pnpm cache
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-
    - name: Update NPM
      if: ${{ runner.os != 'Windows' }}
      shell: bash
      run: npm i -g npm@11.6.1
    - name: Install Node.js Dependencies
      shell: bash
      run: pnpm i --frozen-lockfile --prefer-offline
    - name: Set git identity
      shell: bash
      run: |-
        git config user.name "release"
        git config user.email "release@github.com"
    - uses: nrwl/nx-set-shas@v4
